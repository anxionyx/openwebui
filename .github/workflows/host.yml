name: Spawn Quick Open WebUI

on: [workflow_dispatch]

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Open WebUI and Quick Tunnel
        run: |
          docker pull ghcr.io/open-webui/open-webui:main
          docker run -d -p 3000:8080 -v open-webui:/app/backend/data --name open-webui ghcr.io/open-webui/open-webui:main
      - name: Wait and Extract Public URL
        run: |
          wget -O cloudflared https://github.com/cloudflare/cloudflared/releases/download/2026.5.0/cloudflared-fips-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared tunnel --url http://localhost:3000 &
          sleep 10

        
           
          

      - name: Keep Action Alive (Optional)
        run: |
          
          echo "Keeping runner alive for  1 day . Cancel the workflow run to stop early."
          sleep 86400
