version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    restart: unless-stopped

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    # The magic command for a quick, zero-signup tunnel:
    command: tunnel --url http://open-webui:8080
    restart: unless-stopped
    depends_on:
      - open-webui
